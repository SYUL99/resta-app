<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
  <meta name="theme-color" content="#7a2518"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="주문판"/>
  <title>식당 테이블 주문판</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- PIN Modal -->
<div id="pin-modal" class="modal-overlay" hidden>
  <div class="modal-box pin-box">
    <h3 id="pin-title">PIN을 입력하세요</h3>
    <div id="pin-display" class="pin-display">· · · ·</div>
    <div id="pin-error" class="pin-error"></div>
    <div class="pin-grid">
      <button data-pin="1">1</button><button data-pin="2">2</button><button data-pin="3">3</button>
      <button data-pin="4">4</button><button data-pin="5">5</button><button data-pin="6">6</button>
      <button data-pin="7">7</button><button data-pin="8">8</button><button data-pin="9">9</button>
      <button data-pin="cancel" class="pin-cancel">취소</button><button data-pin="0">0</button><button data-pin="del" class="pin-del">⌫</button>
    </div>
  </div>
</div>

<!-- Receipt Modal -->
<div id="receipt-modal" class="modal-overlay" hidden>
  <div class="modal-box receipt-box">
    <div id="receipt-content"></div>
    <div class="receipt-actions">
      <button id="receipt-print"   class="ghost-button"   type="button">🖨 영수증 출력</button>
      <button id="receipt-cancel"  class="ghost-button"   type="button">취소</button>
      <button id="receipt-confirm" class="primary-button" type="button">✓ 결제 완료</button>
    </div>
  </div>
</div>

<div class="shell">
  <!-- Header -->
  <header class="hero">
    <div class="hero-text">
      <p class="eyebrow">Table Order Board</p>
      <h1>테이블 주문판</h1>
    </div>
    <div class="summary-card">
      <div class="summary-row">
        <div class="summary-item">
          <span>사용 중</span>
          <strong id="open-table-count">0개 테이블</strong>
        </div>
        <div class="summary-item">
          <span>총 매출</span>
          <strong id="sales-total">0원</strong>
        </div>
      </div>
      <div class="summary-footer">
        <small id="app-mode" class="app-mode-badge">브라우저</small>
      </div>
    </div>
  </header>

  <main class="layout">
    <!-- Left: Tables -->
    <section class="panel tables-panel">
      <div class="panel-header">
        <div>
          <p class="section-label">Tables</p>
          <h2>테이블 현황</h2>
        </div>
        <button id="reset-button" class="danger-button" type="button">🔒 초기화</button>
      </div>

      <!-- Merge -->
      <div class="merge-panel">
        <div class="merge-info">
          <p class="section-label">Merge</p>
          <h3 id="selected-table-count">1개 선택</h3>
          <p id="table-selection-summary" class="merge-copy">테이블을 선택하면 단체석으로 묶을 수 있습니다.</p>
          <p id="merge-status" class="merge-copy muted"></p>
        </div>
        <div class="merge-actions">
          <button id="merge-button"   class="primary-button" type="button">묶기</button>
          <button id="unmerge-button" class="ghost-button"   type="button">해제</button>
        </div>
      </div>

      <!-- Zone legend -->
      <div class="zone-legend">
        <span class="legend-item"><span class="legend-dot empty"></span>빈 테이블</span>
        <span class="legend-item"><span class="legend-dot occupied"></span>사용 중</span>
        <span class="legend-item"><span class="legend-dot waiting"></span>대기 주문</span>
      </div>

      <div class="floormap">
        <div class="floormap-hall">
          <div class="floormap-col" id="col-hall-left"><p class="floormap-col-label">홀 좌측</p></div>
          <div class="floormap-col" id="col-hall-center"><p class="floormap-col-label">홀 가운데</p></div>
          <div class="floormap-col" id="col-hall-right"><p class="floormap-col-label">홀 우측</p></div>
        </div>
        <div class="floormap-rooms">
          <div class="floormap-room-group" id="col-room-large"><p class="floormap-col-label">큰방</p><div class="room-row"></div></div>
          <div class="floormap-room-group" id="col-room-small-1"><p class="floormap-col-label">작은방 1</p><div class="room-row"></div></div>
          <div class="floormap-room-group" id="col-room-small-2"><p class="floormap-col-label">작은방 2</p><div class="room-row"></div></div>
        </div>
      </div>
    </section>

    <!-- Right: Order / KDS / Menu / Materials -->
    <section class="panel order-panel">
      <div class="tab-bar">
        <button class="tab-button is-active" data-tab="orders"    type="button">🍽 주문</button>
        <button class="tab-button"           data-tab="kds"       type="button">👨‍🍳 주방</button>
        <button class="tab-button"           data-tab="menus"     type="button">📋 메뉴</button>
        <button class="tab-button"           data-tab="materials" type="button">📦 원재료</button>
      </div>

      <!-- 주문 탭 -->
      <div id="tab-orders" class="tab-panel">
        <div class="panel-header">
          <div>
            <p class="section-label">Orders</p>
            <h2 id="active-table-title">테이블</h2>
          </div>
          <div class="header-actions">
            <button id="checkout-button" class="checkout-button" type="button" disabled>💳 결제</button>
            <span id="sync-status" class="sync-status" hidden></span>
          </div>
        </div>

        <form id="order-form" class="order-form">
          <label class="form-label">
            <span>메뉴</span>
            <select id="menu-select" name="menuName"></select>
          </label>
          <label class="form-label">
            <span>가격</span>
            <input id="menu-price" name="menuPrice" type="number" min="0" step="1000" required/>
          </label>
          <label class="form-label">
            <span>수량</span>
            <input id="menu-qty" name="menuQty" type="number" min="1" value="1" required/>
          </label>
          <label class="form-label form-label--wide">
            <span>메모</span>
            <input name="menuMemo" type="text" placeholder="요청사항 (선택)"/>
          </label>
          <button type="submit" class="primary-button form-submit">추가</button>
        </form>

        <div class="quick-menu"></div>

        <div class="order-summary">
          <div class="summary-stat">
            <span>주문 건수</span>
            <strong id="order-count">0건</strong>
          </div>
          <div class="summary-stat">
            <span>테이블 합계</span>
            <strong id="table-total">0원</strong>
          </div>
        </div>

        <ul id="order-list" class="order-list"></ul>
      </div>

      <!-- 주방 탭 -->
      <div id="tab-kds" class="tab-panel" hidden>
        <div class="panel-header">
          <div><p class="section-label">Kitchen</p><h2>주방 디스플레이</h2></div>
        </div>
        <div id="kds-list" class="kds-grid"></div>
      </div>

      <!-- 메뉴 관리 탭 -->
      <div id="tab-menus" class="tab-panel" hidden>
        <div class="panel-header">
          <div><p class="section-label">Menus</p><h2>메뉴 관리</h2></div>
        </div>
        <form id="menu-add-form" class="menu-add-form">
          <label class="form-label">
            <span>메뉴명</span>
            <input name="newMenuName" type="text" placeholder="예: 삼계탕" required/>
          </label>
          <label class="form-label">
            <span>가격</span>
            <input name="newMenuPrice" type="number" min="0" step="1000" placeholder="15000" required/>
          </label>
          <button type="submit" class="primary-button">추가</button>
        </form>
        <ul id="menu-manage-list" class="menu-manage-list"></ul>
      </div>

      <!-- 원재료 탭 -->
      <div id="tab-materials" class="tab-panel" hidden>
        <div class="panel-header">
          <div><p class="section-label">Materials</p><h2>원재료 입력</h2></div>
        </div>
        <form id="material-form" class="material-form">
          <label class="form-label"><span>날짜</span><input id="mat-date" name="matDate" type="date" required/></label>
          <label class="form-label"><span>재료명</span><input name="matName" type="text" placeholder="예: 닭 1박스" required/></label>
          <label class="form-label"><span>수량</span><input name="matQty" type="text" placeholder="10"/></label>
          <label class="form-label"><span>단위</span><input name="matUnit" type="text" placeholder="kg, 마리"/></label>
          <label class="form-label"><span>가격(원)</span><input name="matPrice" type="number" min="0" step="1000" required/></label>
          <label class="form-label"><span>메모</span><input name="matMemo" type="text" placeholder="선택사항"/></label>
          <button type="submit" class="primary-button" style="grid-column:1/-1">원재료 추가</button>
        </form>
        <ul id="material-list" class="order-list" style="margin-top:16px"></ul>
      </div>
    </section>
  </main>
</div>

<!-- Templates -->
<template id="table-card-template">
  <button class="table-card" type="button">
    <div class="table-card__top">
      <span class="table-card__name"></span>
      <span class="table-card__merge"></span>
    </div>
    <strong class="table-card__total"></strong>
    <small class="table-card__meta"></small>
    <span class="table-select">선택</span>
  </button>
</template>

<script src="app.js"></script>
</body>
</html>
